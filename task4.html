<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Footer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.content{
    flex:1;
    padding:50px;
    text-align:center;
}

/* Footer */

.footer{
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    color:white;
    padding:50px 20px 20px;
}

.footer-container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:30px;
    max-width:1200px;
    margin:auto;
}

.footer-box{
    flex:1;
    min-width:250px;
}

.footer-box h3{
    margin-bottom:15px;
    font-size:22px;
}

.footer-box p,
.footer-box a{
    color:white;
    text-decoration:none;
    line-height:2;
}

.footer-box a:hover{
    text-decoration:underline;
}

.social-icons{
    margin-top:15px;
}

.social-icons a{
    display:inline-block;
    width:40px;
    height:40px;
    line-height:40px;
    text-align:center;
    background:white;
    color:#2575fc;
    border-radius:50%;
    margin-right:10px;
    font-weight:bold;
    transition:0.3s;
}

.social-icons a:hover{
    transform:scale(1.1);
}

.footer-bottom{
    text-align:center;
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,0.3);
}

/* Mobile */

@media(max-width:768px){

    .footer-container{
        flex-direction:column;
        text-align:center;
    }

    .social-icons{
        justify-content:center;
    }
}

</style>
</head>
<body>

<div class="content">
    <h1>Website Content Here</h1>
</div>

<footer class="footer">

    <div class="footer-container">

        <div class="footer-box">
            <h3>🚀 MyCompany</h3>
            <p>
                We create innovative digital solutions
                for businesses worldwide.
            </p>
        </div>

        <div class="footer-box">
            <h3>Quick Links</h3>
            <p><a href="#">Home</a></p>
            <p><a href="#">About</a></p>
            <p><a href="#">Services</a></p>
            <p><a href="#">Contact</a></p>
        </div>

        <div class="footer-box">
            <h3>Contact</h3>
            <p>📍 Chennai, India</p>
            <p>📞 +91 9876543210</p>
            <p>✉ info@mycompany.com</p>
        </div>

        <div class="footer-box">
            <h3>Follow Us</h3>

            <div class="social-icons">
                <a href="#">F</a>
                <a href="#">I</a>
                <a href="#">X</a>
                <a href="#">L</a>
            </div>

        </div>

    </div>

    <div class="footer-bottom">
        <p>© 2026 MyCompany. All Rights Reserved.</p>
    </div>

</footer>

</body>
</html>
